<!DOCTYPE html>
<html lang="ka" class="dark"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="Idws_ky_A2EttQ1j8H6vcuPM-InZqRztKQIRYFgeo24" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">

    <title>FinHub.ge - კრიპტო და ვალუტის პორტალი</title>
    <meta name="description" content="FinHub.ge - აკონტროლე და დააკონვერტირე კრიპტოვალუტები და ფიატის ვალუტები რეალურ დროში.">
    <meta name="keywords" content="კრიპტო, ვალუტა, კურსები, კონვერტერი, ლარი, დოლარი, ბიტკოინი">
    <meta name="author" content="Beso Kardava">
    
    <meta property="og:title" content="FinHub.ge - ფინანსური ჰაბი">
    <meta property="og:description" content="ყველაზე სწრაფი კრიპტო და ვალუტის კონვერტერი რეალურ დროში.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1621504450181-5d356f61d307?q=80&w=1200&auto=format&fit=crop">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        tr { cursor: pointer; transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-white font-sans min-h-screen transition-colors duration-300">

    <nav class="border-b border-slate-200 dark:border-slate-800 p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 transition-colors duration-300">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-emerald-500 dark:from-blue-400 dark:to-emerald-400 bg-clip-text text-transparent cursor-pointer hover:opacity-80 transition">
                FinHub.ge
            </h1>
            
            <div class="flex items-center gap-4">
                <div id="last-updated" class="text-xs text-slate-500 font-mono hidden sm:block">მონაცემები ახლდება...</div>
                
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition shadow-inner">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <section class="text-center mb-10">
            <h2 class="text-3xl md:text-4xl font-extrabold mb-3 tracking-tight">ფინანსური ჰაბი</h2>
            <p class="text-slate-600 dark:text-slate-400 transition-colors">აკონტროლე და დააკონვერტირე აქტივები ერთ სივრცეში</p>
        </section>

        <section id="converter-section" class="mb-12 scroll-mt-24">
            <div class="bg-gradient-to-br from-white to-slate-100 dark:from-slate-800 dark:to-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl dark:shadow-2xl max-w-4xl mx-auto transition-all duration-300">
                <div class="flex items-center gap-2 mb-6">
                    <i class="fas fa-calculator text-blue-600 dark:text-blue-400 text-xl"></i>
                    <h3 class="text-xl font-bold">სწრაფი კონვერტერი</h3>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-7 gap-4 items-center">
                    <div class="md:col-span-3">
                        <div class="relative">
                            <input type="number" id="convert-from-amount" value="100" class="w-full bg-slate-100 dark:bg-slate-700/50 border border-slate-300 dark:border-slate-600 rounded-2xl p-4 pl-12 focus:outline-none focus:border-blue-500 transition text-xl font-bold text-slate-900 dark:text-white">
                            <span id="from-symbol-icon" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 font-bold">$</span>
                            <select id="convert-from-select" onchange="updateConversion()" class="absolute right-2 top-2 bottom-2 bg-slate-200 dark:bg-slate-800 border-none rounded-xl px-2 text-sm focus:ring-0 cursor-pointer font-bold text-slate-900 dark:text-white transition-colors">
                                <option value="USD" selected>USD</option>
                                <option value="GEL">GEL</option>
                                <option value="BTC">BTC</option>
                                <option value="ETH">ETH</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex justify-center md:col-span-1">
                        <button onclick="swapCurrencies()" class="bg-blue-100 dark:bg-blue-600/20 p-3 rounded-full text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-500/30 hover:bg-blue-200 dark:hover:bg-blue-600/40 transition cursor-pointer">
                            <i class="fas fa-exchange-alt md:rotate-0 rotate-90"></i>
                        </button>
                    </div>

                    <div class="md:col-span-3">
                        <div class="relative">
                            <input type="text" id="convert-to-amount" readonly placeholder="შედეგი..." class="w-full bg-slate-50 dark:bg-slate-700/30 border border-slate-200 dark:border-slate-600 rounded-2xl p-4 pl-12 text-xl font-bold text-emerald-600 dark:text-emerald-400 focus:outline-none transition-colors">
                            <span id="to-symbol-icon" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 font-bold">₾</span>
                            <select id="convert-to-select" onchange="updateConversion()" class="absolute right-2 top-2 bottom-2 bg-slate-200 dark:bg-slate-800 border-none rounded-xl px-2 text-sm focus:ring-0 cursor-pointer font-bold text-slate-900 dark:text-white transition-colors">
                                <option value="GEL" selected>GEL</option>
                                <option value="USD">USD</option>
                                <option value="BTC">BTC</option>
                                <option value="ETH">ETH</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="flex space-x-2 bg-slate-200 dark:bg-slate-800 p-1 rounded-xl border border-slate-300 dark:border-slate-700 w-full md:w-auto overflow-x-auto transition-colors">
                <button onclick="switchTab('crypto')" id="cryptoTab" class="px-6 py-2 rounded-lg bg-blue-600 text-white font-bold transition-all shadow-lg whitespace-nowrap">კრიპტო</button>
                <button onclick="switchTab('fiat')" id="fiatTab" class="px-6 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-white transition-all whitespace-nowrap">ვალუტა (GEL)</button>
            </div>
            
            <div class="relative w-full md:w-64 flex-shrink-0">
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="ძებნა (მაგ: BTC)..." class="w-full bg-white dark:bg-slate-800/80 border border-slate-300 dark:border-slate-700 rounded-xl py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-blue-500 text-slate-900 dark:text-white placeholder-slate-400 transition shadow-inner">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            </div>

            <button onclick="refreshData()" class="w-full md:w-auto text-sm text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 flex justify-center items-center gap-2 bg-white dark:bg-slate-800 px-4 py-2 rounded-xl border border-slate-300 dark:border-slate-700 transition flex-shrink-0">
                <i class="fas fa-sync-alt" id="refresh-icon"></i> <span class="md:hidden lg:inline">განახლება</span>
            </button>
        </div>

        <div class="bg-white dark:bg-slate-800/50 rounded-3xl overflow-hidden shadow-xl dark:shadow-2xl border border-slate-200 dark:border-slate-700 relative backdrop-blur-sm transition-colors">
            <div id="loading-overlay" class="absolute inset-0 bg-white/80 dark:bg-slate-900/60 flex items-center justify-center z-10 hidden backdrop-blur-sm">
                <div class="loader w-10 h-10 border-4 border-slate-300 dark:border-slate-700 rounded-full"></div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-100 dark:bg-slate-700/20 text-slate-600 dark:text-slate-500 text-xs uppercase tracking-widest transition-colors">
                            <th class="p-5 font-semibold">აქტივი</th>
                            <th class="p-5 font-semibold text-right">ფასი</th>
                            <th class="p-5 font-semibold text-right">24სთ ცვლილება</th>
                            <th class="p-5 font-semibold text-right hidden md:table-cell">საბაზრო კაპ.</th>
                        </tr>
                    </thead>
                    <tbody id="data-table" class="divide-y divide-slate-200 dark:divide-slate-700/30 transition-colors">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="container mx-auto px-4 py-12 text-center text-slate-500 text-xs">
        &copy; 2026 FinHub.ge | აწყობილია Beso Kardava-ს მიერ
    </footer>

    <script src="app.js"></script>
</body>
</html>
